<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PourCost — BackStage Bar</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f14; color: #e8e8ee; min-height: 100vh; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    header { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #c9a84c; letter-spacing: .05em; }
    header .user { margin-left: auto; font-size: .85rem; color: #888; }
    header button.logout { background: none; border: 1px solid #444; color: #aaa; padding: .3rem .8rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
    header button.logout:hover { border-color: #c9a84c; color: #c9a84c; }

    /* Main */
    main { flex: 1; padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* Cards */
    .card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px; padding: 1.25rem; }

    /* Botones */
    .btn { padding: .5rem 1.1rem; border-radius: 7px; border: none; cursor: pointer; font-size: .9rem; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #c9a84c; color: #0f0f14; }
    .btn-secondary { background: #2a2a3a; color: #ccc; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

    /* Inputs */
    input, select { background: #0f0f14; border: 1px solid #333; color: #e8e8ee; padding: .5rem .8rem; border-radius: 7px; font-size: .9rem; width: 100%; }
    input:focus, select:focus { outline: none; border-color: #c9a84c; }
    label { font-size: .8rem; color: #888; margin-bottom: .3rem; display: block; }

    /* Badges */
    .badge { display: inline-block; padding: .15rem .55rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
    .badge-ok { background: #1a3a2a; color: #4caf82; }
    .badge-warn { background: #3a2a10; color: #c9a84c; }
    .badge-danger { background: #3a1a1a; color: #cf6679; }

    /* Tabla */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th { text-align: left; padding: .6rem .8rem; color: #888; font-weight: 500; border-bottom: 1px solid #2a2a3a; }
    td { padding: .6rem .8rem; border-bottom: 1px solid #1e1e2a; }
    tr:last-child td { border-bottom: none; }

    /* Utilities */
    .text-gold { color: #c9a84c; }
    .text-muted { color: #666; font-size: .82rem; }
    .text-right { text-align: right; }
    .flex { display: flex; }
    .gap-1 { gap: .5rem; }
    .gap-2 { gap: 1rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mb-1 { margin-bottom: .5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .mt-1 { margin-top: .5rem; }
    .mt-2 { margin-top: 1rem; }
    .w-full { width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .alert { padding: .75rem 1rem; border-radius: 7px; font-size: .88rem; margin-bottom: 1rem; }
    .alert-error { background: #3a1a1a; border: 1px solid #5a2a2a; color: #cf6679; }
    .clickable { cursor: pointer; }
    .clickable:hover td { background: #1e1e2c; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module" src="api.js"></script>
<script type="module" src="components/LoginForm.js"></script>
<script type="module" src="components/CocktailList.js"></script>
<script type="module" src="components/CocktailDetail.js"></script>
<script type="module" src="components/PourCostPanel.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
